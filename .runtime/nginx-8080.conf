worker_processes auto;
events { worker_connections 1024; }
http {
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream orchestrator_api { server 127.0.0.1:5121; }
  upstream terminal_gateway { server 127.0.0.1:7300; }
  upstream secretary_web { server 127.0.0.1:7301; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://secretary_web;
      proxy_set_header Host $host;
    }

    location /api/ {
      proxy_pass http://orchestrator_api;
      proxy_set_header Host $host;
    }

    location /hubs/ {
      proxy_pass http://orchestrator_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location /ws/terminal {
      proxy_pass http://terminal_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location /healthz {
      return 200 "ok";
    }
  }
}
