<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Settings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 16px;
        color: #333;
        background: transparent;
      }
      h2 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      p {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
      }
      .card {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .card h3 {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .card code {
        background: #e9ecef;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h2>Hello World Extension</h2>
    <p>Welcome! This settings page is contributed by the Hello World Theme Extension.</p>
    <div class="card">
      <h3>Extension Info</h3>
      <p>
        This extension provides the <code>Ocean Breeze</code> and <code>Sunset Glow</code> themes, along with the
        <code>Hello World Assistant</code>.
      </p>
    </div>
  </body>
</html>
