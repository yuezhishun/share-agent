worker_processes auto;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  upstream terminal_gateway_api {
    server terminal-gateway-dotnet:7300;
  }

  upstream secretary_web {
    server secretary-web:80;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://secretary_web;
    }

    location /web-pty/api/ {
      proxy_pass http://terminal_gateway_api/api/;
      proxy_set_header Host $host;
    }

    location /web-pty/hubs/ {
      proxy_pass http://terminal_gateway_api/hubs/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location /healthz {
      return 200 "ok";
    }
  }
}
